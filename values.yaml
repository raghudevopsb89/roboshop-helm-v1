job:
  enabled: false

ingress:
  enabled: false

config_map: {}

service_type: ClusterIP

prometheus:
  enabled: true
  path: /metrics
  serviceMonitor:
    enabled: true
    # ServiceMonitor CR namespace. Existing stack monitors only discover SMs in default.
    namespace: default
    interval: 30s
    scrapeTimeout: 10s
    # Labels must match Prometheus Operator serviceMonitorSelector.
    # This cluster uses kube-prometheus-stack release name "pstack".
    labels:
      release: pstack

resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "128Mi"
    cpu: "150m"


