job:
  enabled: false

ingress:
  enabled: false

config_map: {}

service_type: ClusterIP

prometheus:
  enabled: true
  path: /metrics
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    # Labels must match your Prometheus Operator serviceMonitorSelector.
    # kube-prometheus-stack typically uses release: prometheus
    labels:
      release: prometheus
