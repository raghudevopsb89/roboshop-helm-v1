apiVersion: apps/v1
kind: Deployment
metadata:
  name: roboshop-{{ .Values.app_name }}
  labels:
    app: roboshop-{{ .Values.app_name }}
spec:
  #replicas: 1
  selector:
    matchLabels:
      app: roboshop-{{ .Values.app_name }}
  template:
    metadata:
      labels:
        app: roboshop-{{ .Values.app_name }}
      {{- $prometheusEnabled := true -}}
      {{- if and .Values.prometheus (kindIs "bool" .Values.prometheus.enabled) -}}
      {{- $prometheusEnabled = .Values.prometheus.enabled -}}
      {{- end -}}
      {{- if $prometheusEnabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ if and .Values.prometheus.exporter .Values.prometheus.exporter.enabled }}{{ .Values.prometheus.exporter.port | default 9113 }}{{ else }}{{ .Values.app_port }}{{ end }}"
        prometheus.io/path: {{ .Values.prometheus.path | default "/metrics" | quote }}
      {{- end }}
    spec:
      containers:
      - name: roboshop-{{ .Values.app_name }}
        image: raghudevopsb89.azurecr.io/roboshop-{{ .Values.app_name }}
        imagePullPolicy: Always
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        envFrom:
          - configMapRef:
              name: roboshop-{{ .Values.app_name }}
      {{- if and .Values.prometheus .Values.prometheus.exporter .Values.prometheus.exporter.enabled }}
      - name: nginx-exporter
        image: {{ .Values.prometheus.exporter.image | default "nginx/nginx-prometheus-exporter:1.4.2" }}
        args:
          - -nginx.scrape-uri=http://127.0.0.1:{{ .Values.app_port }}/stub_status
        ports:
          - name: metrics
            containerPort: {{ .Values.prometheus.exporter.port | default 9113 }}
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "150m"
      {{- end }}
