apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: roboshop-{{ .Values.app_name }}
spec:
  groups:
  - name: roboshop-{{ .Values.app_name }}
    rules:
    - alert: HttpResponseTimeHigh
      expr: http_server_requests_seconds_max > 1
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: "HttpResponseTimeHigh for {{`{{ $labels.service }}`}}"
        description: "Thre is a high response time been observed for this application"

