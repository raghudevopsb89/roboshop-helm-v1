{{ if .Values.job.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: roboshop-{{ .Values.app_name }}-db
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "2"
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      restartPolicy: Never
      containers:
      - name: roboshop-{{ .Values.app_name }}-db
        image: raghudevopsb89.azurecr.io/roboshop-{{ .Values.app_name }}-db
        imagePullPolicy: Always
        securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true  # Change to true if your container doesn't write to local disk
            capabilities:
              drop:
                - ALL
        envFrom:
          - configMapRef:
              name: roboshop-{{ .Values.app_name }}
          - secretRef:
              name: roboshop-{{ .Values.app_name }}
{{ end }}
