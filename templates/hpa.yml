apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: roboshop-{{ .Values.app_name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: roboshop-{{ .Values.app_name }}
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50

